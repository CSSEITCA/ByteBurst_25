<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Smooth 3D Animated Auto Slider</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    #heading{
      display: flex;
      margin-top: 8%;
      margin-left: 43%;
      font-size: 3em;
      color: #673499;
      margin-top: 20px;
      padding-top: 17px;
      font-family: 'Montserrat', sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000000;
      overflow: hidden;
      font-family: sans-serif;
    }

    .slider-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      perspective: 2000px;
    }

    .slider {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .slide {
      position: absolute;
      top: 50%;
      left: 50%;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: transform 0.8s ease-in-out, opacity 0.8s ease-in-out;
      box-shadow: 0 40px 90px #4e59a9;
      border: 10px solid rgb(0, 0, 0)a1;
      background: rgb(0, 0, 0);
      overflow: hidden;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .slide.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .slide.animate-in-left {
      animation: smoothInLeft 0.8s ease-in-out;
    }

    .slide.animate-in-right {
      animation: smoothInRight 0.8s ease-in-out;
    }

    @keyframes smoothInLeft {
      from {
        transform: translate(-80%, -50%) scale(0.9);
        opacity: 0;
      }
      to {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
    }

    @keyframes smoothInRight {
      from {
        transform: translate(-20%, -50%) scale(0.9);
        opacity: 0;
      }
      to {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
    }

    .nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 60px;
      color: rgba(255, 255, 255, 0.9);
      cursor: pointer;
      z-index: 10;
      padding: 20px;
      user-select: none;
    }

    .nav.left { left: 20px; }
    .nav.right { right: 20px; }
  </style>
</head>
<body>
<span id="heading"><b>GALLERY</span>
<div class="slider-container">
  <div class="nav left" onclick="move(-1)">&#10094;</div>
  <div class="slider" id="slider"></div>
  <div class="nav right" onclick="move(1)">&#10095;</div>
</div>

<script>
  const slider = document.getElementById('slider');
  const imageUrls = Array.from({ length: 20 }, (_, i) => `images/img${i + 1}.jpg`);

  const visibleRange = 3;
  let currentIndex = 0;
  let slides = [];

  function setupSlides() {
    for (let i = 0; i < visibleRange * 2 + 1; i++) {
      const div = document.createElement('div');
      div.className = 'slide';
      div.innerHTML = `<img src="" alt="Slide">`;
      slider.appendChild(div);
      slides.push(div);
    }
  }

  function updateSlides(dir = 1) {
    const total = imageUrls.length;

    slides.forEach((slide, i) => {
      const offset = i - visibleRange;
      const imgIndex = (currentIndex + offset + total) % total;
      const img = slide.querySelector('img');
      img.src = imageUrls[imgIndex];

      slide.classList.remove('animate-in-left', 'animate-in-right');

      void slide.offsetWidth; // Reset animation trigger

      slide.style.zIndex = visibleRange * 2 - Math.abs(offset);

      if (offset === 0) {
        slide.style.width = '60vw';
        slide.style.height = '75vh';
        slide.style.transform = 'translate(-50%, -50%) scale(1)';
        slide.classList.add(dir > 0 ? 'animate-in-right' : 'animate-in-left');
      } else {
        const scale = 0.6;
        const posX = offset * 250;
        const rotateY = offset * 10;
        slide.style.width = '30vw';
        slide.style.height = '50vh';
        slide.style.transform = `
          translate(calc(-50% + ${posX}px), -50%)
          scale(${scale})
          rotateY(${rotateY}deg)
        `;
      }

      slide.classList.add('visible');
    });
  }

  function move(dir) {
    currentIndex = (currentIndex + dir + imageUrls.length) % imageUrls.length;
    updateSlides(dir);
  }

  setupSlides();
  updateSlides();

  // 🔁 Auto move every 3 seconds
  setInterval(() => move(1), 3000);
  setInterval(() => {
    if (document.getElementById("formalSlider").style.display !== "none") {
      nextFormal();
    } else {
      nextInformal();
    }
  }, 4000);
</script>

</body>
</html>
