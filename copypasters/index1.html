<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lottie JSON Animation</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.0/lottie.min.js"></script>
</head>
<body style="background: #111; display: flex; justify-content: center; align-items: center; height: 100vh;">

  <div id="myLottie" style="width: 300px; height: 300px;"></div>

  <script>
    lottie.loadAnimation({
      container: document.getElementById('myLottie'),
      renderer: 'svg',
      loop: true,
      autoplay: true,
      path: 'animation.json'  // local or hosted JSON file
    });
  </script>

</body>
</html>
